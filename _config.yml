# ─────────────────────────────────────────────────────────────
#  Haphazard Solutions — site configuration
#  Edit the values below; GitHub Pages rebuilds on every push.
# ─────────────────────────────────────────────────────────────

title:       Haphazard Solutions
tagline:     "Don't fight chaos: Own it."
description: >-
  Operational intelligence and operational effectiveness consulting. We find
  what's actually true in your data, operations, and risk — and build the
  discipline to hold it.

# Public contact address — shown as a mailto link in the footer of every page.
# Catch-all *@haphazardsolutions.com forwards to an external mailbox (Namecheap).
email: contact@haphazardsolutions.com

# Your live site address. Used for absolute links, SEO tags, sitemaps.
url:     "https://haphazardsolutions.com"
baseurl: ""   # keep empty — the custom domain serves from the root

# Byline + structured-data identity.
author: Nathaniel Whitten

# Preview / branding assets (absolute-ized at render time).
og_image: /assets/og-image.png
logo:     /assets/logo-mark.png

# Google Analytics 4 measurement ID. Injected only on the production build
# (see the jekyll.environment guard in _layouts/hs.html), so local dev traffic
# isn't tracked. Blank it out to disable.
google_analytics: G-5JCNL44L3Q

# Public profile URLs — uncomment/populate to emit sameAs + card attribution.
# social:
#   - https://www.linkedin.com/in/your-handle
#   - https://github.com/smearvox

# Header navigation. Add/remove/reorder freely.
nav:
  - name: Home
    url: /
  - name: Services
    url: /services/
  - name: Research
    url: /research/
  - name: Knowledge
    url: /knowledge/
  - name: About
    url: /about/

# ── Build settings (safe defaults for GitHub Pages) ──
markdown: kramdown

# Plugins — must be on the GitHub Pages allowlist.
plugins:
  - jekyll-sitemap

# Keep internal notes, tooling, and gem files out of the built site.
# Note: setting `exclude` REPLACES Jekyll's default list, so the usual
# Gemfile/vendor entries are repeated here alongside our additions.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - scripts          # Python KB tooling — not site content
  - deploy.bat       # local ship script — not site content
  - README.md        # repo readme; not a site page
  - CLAUDE.md        # internal notes (also git-ignored)
  - PUNCH.md         # internal notes (also git-ignored)
  - RESUME.md        # internal notes (also git-ignored)

# No theme. We ship our own layouts and CSS, so we must override the
# github-pages gem's default (jekyll-theme-primer) — otherwise Primer's
# assets/css/style.scss compiles to /assets/css/style.css and clobbers ours.
theme: null

# ── Collections: knowledge-base articles (Markdown → rendered pages) ──
collections:
  articles:
    output: true
    permalink: /knowledge/:name/

defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: article
      status_label: "KNOWLEDGE // ARTICLE"
      status_state: "● PUBLISHED"
      status_meta: "OPEN ACCESS"
      status_seq: "SEQ 0x7F"
      nav_active: /knowledge/
