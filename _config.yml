# ─────────────────────────────────────────────────────────────
#  Haphazard Solutions — site configuration
#  Edit the values below; GitHub Pages rebuilds on every push.
# ─────────────────────────────────────────────────────────────

title:       Haphazard Solutions
tagline:     "Don't fight chaos: Own it."
description: >-
  Haphazard Solutions is a boutique consultancy that helps teams turn
  messy, ambiguous problems into clear, dependable outcomes.

# Public contact address — shown as a mailto link in the footer of every page.
# Catch-all *@haphazardsolutions.com forwards to an external mailbox (Namecheap).
email: contact@haphazardsolutions.com

# Your live site address. Used for absolute links, SEO tags, sitemaps.
url:     "https://haphazardsolutions.com"
baseurl: ""   # keep empty — the custom domain serves from the root

# Header navigation. Add/remove/reorder freely.
nav:
  - name: Home
    url: /
  - name: Services
    url: /services/
  - name: Research
    url: /research/
  - name: Knowledge
    url: /knowledge/
  - name: About
    url: /about/

# ── Build settings (safe defaults for GitHub Pages) ──
markdown: kramdown

# No theme. We ship our own layouts, includes, and CSS, so we must override the
# github-pages gem's default (jekyll-theme-primer) — otherwise Primer's
# assets/css/style.scss compiles to /assets/css/style.css and clobbers ours.
theme: null
